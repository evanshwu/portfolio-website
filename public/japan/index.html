<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#165E83">
<title>Japan 2026 · Itinerary</title>
<style>
  :root {
    --pad: 20px;
    --paper: #F7F8F5;
    --card: #FFFFFF;
    --ink: #1B1D22;
    --muted: #6A7076;
    --line: #165E83;          /* ai-iro indigo — the "line color" of this trip */
    --line-soft: rgba(22, 94, 131, 0.12);
    --accent: #C0392F;        /* madder red — reserved for "today" */
    --hairline: #E3E6E2;
    --font-sign: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic Medium", "Yu Gothic", system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  body {
    font-family: var(--font-sign);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    border-top: 5px solid var(--line);  /* the colored strip on a station sign */
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; }
  a:focus-visible, summary:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 6px;
  }

  .wrap { max-width: 620px; margin: 0 auto; padding-left: var(--pad); padding-right: var(--pad); }

  /* ---------- header ---------- */
  .site-head { padding-top: 34px; padding-bottom: 18px; }
  .head-row { display: flex; align-items: center; gap: 14px; }
  .line-symbol {
    flex: none;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--line);
    color: var(--paper);
    display: grid; place-items: center;
    font-size: 22px; font-weight: 700;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  h1 {
    font-size: clamp(32px, 8vw, 44px);
    font-weight: 800;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .trip-meta {
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .trip-meta b { color: var(--line); font-weight: 600; }

  /* ---------- day strip nav ---------- */
  .day-strip {
    position: sticky; top: 0; z-index: 10;
    background: var(--paper);
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--hairline);
  }
  .day-strip-inner {
    display: flex; gap: 10px;
    overflow-x: auto;
    padding: 10px var(--pad) 12px;
    max-width: 620px; margin: 0 auto;
    scrollbar-width: none;
  }
  .day-strip-inner::-webkit-scrollbar { display: none; }
  .chip {
    flex: none;
    display: flex; flex-direction: column; align-items: center;
    gap: 3px;
    text-decoration: none;
    min-width: 44px;
  }
  .chip-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    display: grid; place-items: center;
    font-family: var(--font-mono);
    font-size: 16px; font-weight: 700;
  }
  .chip-dow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .chip.on .chip-num { background: var(--line); color: var(--paper); }
  .chip.is-today .chip-num { border-color: var(--accent); }

  /* ---------- route timeline ---------- */
  .route {
    position: relative;
    padding-top: 30px; padding-bottom: 10px;
  }
  .route::before {
    content: "";
    position: absolute;
    left: calc(var(--pad) + 22px); top: 0; bottom: 0;
    width: 4px;
    background: var(--line);
    border-radius: 2px;
    transform-origin: top;
    animation: draw 0.9s ease both;
  }
  @keyframes draw { from { transform: scaleY(0); } }

  .day {
    position: relative;
    padding: 0 0 34px 64px;
    scroll-margin-top: 76px;
    animation: rise 0.5s ease both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
  }
  body.ready .day, body.ready .transfer { animation: none; }
  body.ready .route::before { animation: none; }

  .day-badge {
    position: absolute;
    left: 0; top: 0;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 4px solid var(--line);
    background: var(--card);
    display: grid; place-items: center;
    font-family: var(--font-mono);
    font-size: 20px; font-weight: 700;
  }
  .day.is-today .day-badge {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  .day-eyebrow {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 12px;
    padding-top: 4px;
  }
  .day-kanji { font-size: 15px; font-weight: 600; color: var(--line); }
  .day-date {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.14em;
    color: var(--muted);
  }
  .today-pill {
    font-family: var(--font-mono);
    font-size: 11.5px; font-weight: 700;
    letter-spacing: 0.12em;
    background: var(--accent); color: #fff;
    padding: 2px 8px; border-radius: 99px;
  }

  .day-city {
    margin-top: 6px;
    font-size: 30px; font-weight: 800;
    letter-spacing: -0.01em;
    display: flex; align-items: baseline; gap: 10px;
  }
  .day-city .kana { font-size: 17px; font-weight: 600; color: var(--muted); }

  .day-theme { margin-top: 4px; font-size: 16.5px; color: var(--muted); }

  .plans {
    list-style: none;
    margin-top: 14px;
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    overflow: hidden;
  }
  .plans > li {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 12px 16px;
  }
  .plans > li + li { border-top: 1px solid var(--hairline); }
  .plan-time {
    flex: none;
    width: 3.4em;
    font-family: var(--font-mono);
    font-size: 14.5px; font-weight: 600;
    color: var(--line);
    padding-top: 1px;
  }
  .plan-body { min-width: 0; flex: 1; }
  .plan-what { font-size: 17px; font-weight: 600; }
  .plan-note { font-size: 15px; color: var(--muted); margin-top: 1px; }

  /* map link — opens the Maps app on phones */
  .map-link {
    display: inline-flex; align-items: center; gap: 3px;
    font-family: var(--font-mono);
    font-size: 12.5px; font-weight: 600;
    color: var(--line);
    text-decoration: none;
    background: var(--line-soft);
    border-radius: 99px;
    padding: 1px 9px 1px 7px;
    margin-left: 7px;
    vertical-align: 2px;
    white-space: nowrap;
  }
  .map-link .pin { font-size: 11px; line-height: 1; }
  .map-link:hover { background: var(--line); color: #fff; }

  /* ---------- expandable item ---------- */
  .plans > li.has-exp { padding-right: 0; }
  details.exp { flex: 1; min-width: 0; }
  details.exp > summary {
    position: relative;
    list-style: none;
    cursor: pointer;
    padding: 1px 30px 1px 0;
  }
  details.exp > summary::-webkit-details-marker { display: none; }
  details.exp > summary::after {
    content: "⌄";
    position: absolute;
    right: 12px; top: -3px;
    font-family: var(--font-mono);
    font-size: 19px;
    color: var(--line);
    transition: transform 0.2s ease;
  }
  details.exp[open] > summary::after { transform: translateY(4px) rotate(180deg); }
  .exp-hint {
    font-family: var(--font-mono);
    font-size: 11.5px; font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--line);
    background: var(--line-soft);
    border-radius: 99px;
    padding: 1px 8px;
    margin-left: 7px;
    vertical-align: 2px;
    white-space: nowrap;
  }
  .exp-body {
    margin: 12px 12px 4px 0;
    display: flex; flex-direction: column; gap: 14px;
  }
  .opt {
    border-left: 3px solid var(--line-soft);
    padding-left: 13px;
  }
  .opt-label {
    font-size: 15.5px; font-weight: 700; color: var(--line);
    display: flex; flex-wrap: wrap; align-items: center;
  }
  .opt-note { font-size: 14px; color: var(--muted); margin-top: 2px; }
  .places { list-style: none; margin-top: 8px; display: flex; flex-direction: column; gap: 9px; }
  .places li { display: block; padding: 0; border: 0; }
  .places li + li { border-top: 0; }
  .place-row { display: flex; flex-wrap: wrap; align-items: center; }
  .place-name { font-size: 15px; font-weight: 600; }
  .place-note { font-size: 13.5px; color: var(--muted); margin-top: 1px; }

  .empty {
    margin-top: 14px;
    border: 1.5px dashed var(--hairline);
    border-radius: 14px;
    padding: 18px 16px;
    font-size: 16px;
    color: var(--muted);
  }

  .day-notes {
    margin-top: 10px;
    font-size: 15.5px;
    color: var(--muted);
    padding-left: 2px;
  }
  .day-notes::before { content: "✎ "; color: var(--line); }

  /* transfer pill between cities */
  .transfer {
    position: relative;
    margin: -8px 0 26px;
    padding-left: 64px;
    animation: rise 0.5s ease both;
  }
  .transfer span {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--line);
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 99px;
    padding: 4px 12px;
  }
  .transfer::before {
    content: "▼";
    position: absolute;
    left: 18px; top: 2px;
    font-size: 11px;
    color: var(--line);
    background: var(--paper);
    padding: 2px 0;
  }

  /* ---------- footer ---------- */
  .site-foot {
    border-top: 1px solid var(--hairline);
    margin-top: 26px;
    padding-top: 26px; padding-bottom: calc(40px + env(safe-area-inset-bottom));
    text-align: center;
  }
  .foot-kana { font-size: 17px; font-weight: 700; color: var(--line); }
  .foot-route {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
</style>
</head>
<body>

<header class="site-head wrap">
  <div class="head-row">
    <div class="line-symbol" aria-hidden="true">旅</div>
    <div>
      <div class="eyebrow">旅程 · TRIP ITINERARY</div>
      <h1 id="trip-title"></h1>
    </div>
  </div>
  <p class="trip-meta" id="trip-meta"></p>
</header>

<nav class="day-strip" aria-label="Jump to a day">
  <div class="day-strip-inner" id="day-strip"></div>
</nav>

<main class="route wrap" id="route"></main>

<footer class="site-foot wrap">
  <div class="foot-kana">良い旅を</div>
  <div class="foot-route" id="foot-route"></div>
</footer>

<script>
/* ════════════════════════════════════════════════════════════════
   ✏️  TRIP DATA — this is the whole itinerary. Edit it here.
   The page is read-only for anyone viewing it; there's no way to
   change plans from the UI. To update the trip, edit the days below
   and redeploy the file.

   Each day:   { date:"YYYY-MM-DD", city, kana, via?, theme?, notes?, items:[…] }
   Each item:  { time?, title, note?, map? }              ← a simple entry
               { time?, title, note?, options:[…], hint? } ← an expandable entry

   • map   — a place name (opens Google Maps / the map app on phones)
             or a full https:// maps link if you have one.
   • options — turns the entry into a tap-to-expand list.
     Each option: { label, note?, map?, places:[ { name, note?, map? } ] }
   • hint  — overrides the little pill next to an expandable title
             (defaults to "N options"; e.g. set "8 景點" for a spot list).
   ════════════════════════════════════════════════════════════════ */
const TRIP = {
  title: "Japan 2026",
  days: [
    {

        { time: "11:30", title: "降落 BR192 · HND T3", note: "羽田機場 第三航廈", map: "Haneda Airport Terminal 3" },

        {

          options: [
            { label: "新仓山浅间公园", map: "新倉山浅間公園" },
            { label: "新仓山浅间神社", map: "新倉富士浅間神社" },
            { label: "天鹅湖", map: "河口湖 天鵝湖" },
            { label: "大石公园", map: "大石公園 河口湖" },
            { label: "忍野八海古村落", map: "忍野八海" },
            { label: "里根场古村落", note: "西湖いやしの里根場", map: "西湖いやしの里根場" },
            { label: "天梯小镇", map: "河口湖 天上山公園 カチカチ山" },
            { label: "罗森便利店", note: "富士山背景的 Lawson", map: "Lawson 河口湖駅前" },
          ],
        },

    },
    {

        { time: "12:30", title: "包車開始", note: "預計" },
        { time: "15:00", title: "Check in · 五反田花園酒店", map: "五反田 ガーデンホテル 東京" },
        { time: "17:00", title: "池袋", note: "景點", map: "Ikebukuro Tokyo" },

        {
          time: "19:00", title: "晚餐 · 三選一", hint: "3 選擇",
          options: [
            { label: "梅丘寿司の美登利 銀座店", note: "壽司", map: "梅丘寿司の美登利 銀座" },

        {

/* ═══════════════════════════ end of trip data ═══════════════════ */

const DOW = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
const DOW_JP = ["日", "月", "火", "水", "木", "金", "土"];
const MON = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
const KANJI = ["一", "二", "三", "四", "五", "六", "七", "八", "九"];

function kanjiNum(n) {
  if (n <= 9) return KANJI[n - 1];
  if (n === 10) return "十";
  const tens = Math.floor(n / 10), ones = n % 10;
  return (tens > 1 ? KANJI[tens - 1] : "") + "十" + (ones ? KANJI[ones - 1] : "");
}

function parseDate(s) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(s || "")) return null;
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

const dateKey = d => d ? [d.getFullYear(), d.getMonth() + 1, d.getDate()].join("-") : "";

/* timed entries sort chronologically, untimed keep their order at the end */
function timeKey(s) {
  const m = /^(\d{1,2}):(\d{2})$/.exec((s || "").trim());
  return m ? Number(m[1]) * 60 + Number(m[2]) : null;
}
function sortItems(items) {
  return items.map((it, i) => ({ it, i, k: timeKey(it.time) }))
    .sort((a, b) => a.k == null && b.k == null ? a.i - b.i
      : a.k == null ? 1 : b.k == null ? -1 : (a.k - b.k) || (a.i - b.i))
    .map(x => x.it);
}
function sortDays(days) {
  return days.map((d, i) => { const p = parseDate(d.date); return { d, i, k: p ? p.getTime() : null }; })
    .sort((a, b) => a.k == null && b.k == null ? a.i - b.i
      : a.k == null ? 1 : b.k == null ? -1 : (a.k - b.k) || (a.i - b.i))
    .map(x => x.d);
}

/* a place name or a full URL → a Maps link that opens the app on phones */
function mapUrl(q) {
  q = String(q || "").trim();
  if (!q) return "";
  if (/^https?:\/\//i.test(q)) return q;
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q);
}
function mapLink(q, label) {
  const href = mapUrl(q);
  if (!href) return "";
  return ` <a class="map-link" href="${esc(href)}" target="_blank" rel="noopener">` +
    `<span class="pin" aria-hidden="true">📍</span>${esc(label || "Map")}</a>`;
}

function placeHtml(p) {
  return `<li>
    <div class="place-row"><span class="place-name">${esc(p.name)}</span>${p.map ? mapLink(p.map) : ""}</div>
    ${p.note ? `<div class="place-note">${esc(p.note)}</div>` : ""}
  </li>`;
}
function optHtml(o) {
  const places = (o.places || []).map(placeHtml).join("");
  return `<div class="opt">
    <div class="opt-label">${esc(o.label)}${o.map ? mapLink(o.map) : ""}</div>
    ${o.note ? `<div class="opt-note">${esc(o.note)}</div>` : ""}
    ${places ? `<ul class="places">${places}</ul>` : ""}
  </div>`;
}
function itemHtml(it) {
  if (it.options && it.options.length) {
    const n = it.options.length;
    const hint = it.hint || (n + " option" + (n === 1 ? "" : "s"));
    return `<li class="has-exp">
      <span class="plan-time">${esc(it.time || "–")}</span>
      <details class="exp">
        <summary>
          <div class="plan-what">${esc(it.title)}<span class="exp-hint">${esc(hint)}</span></div>
          ${it.note ? `<div class="plan-note">${esc(it.note)}</div>` : ""}
        </summary>
        <div class="exp-body">${it.options.map(optHtml).join("")}</div>
      </details>
    </li>`;
  }
  return `<li>
    <span class="plan-time">${esc(it.time || "–")}</span>
    <div class="plan-body">
      <div class="plan-what">${esc(it.title)}${it.map ? mapLink(it.map) : ""}</div>
      ${it.note ? `<div class="plan-note">${esc(it.note)}</div>` : ""}
    </div>
  </li>`;
}

/* ---------- render ---------- */
const strip = document.getElementById("day-strip");
const route = document.getElementById("route");
let trip = { title: TRIP.title, days: sortDays((TRIP.days || []).map(d => ({ ...d, items: sortItems(d.items || []) }))) };

function render() {
  document.getElementById("trip-title").textContent = trip.title;
  document.title = trip.title + " · Itinerary";

  const todayKey = dateKey(new Date());
  const dates = trip.days.map(d => parseDate(d.date)).filter(Boolean);
  const cityList = trip.days.map(d => d.city).filter(Boolean);
  const cities = new Set(cityList);
  let range = "";
  if (dates.length) {
    const a = dates[0], b = dates[dates.length - 1];
    range = MON[a.getMonth()] + " " + a.getDate() +
      (a.getMonth() === b.getMonth() ? "–" + b.getDate() : " – " + MON[b.getMonth()] + " " + b.getDate()) +
      ", " + b.getFullYear() + " · ";
  }
  document.getElementById("trip-meta").innerHTML =
    esc(range) + "<b>" + trip.days.length + (trip.days.length === 1 ? " day" : " days") + "</b> · " +
    cities.size + (cities.size === 1 ? " city" : " cities");

  /* footer route line — unique cities in order */
  const routeCities = cityList.filter((c, i) => cityList.indexOf(c) === i);
  document.getElementById("foot-route").textContent = routeCities.join("  →  ");

  let stripHtml = "";
  let routeHtml = "";
  let prevCity = null;

  trip.days.forEach((day, i) => {
    const n = i + 1;
    const d = parseDate(day.date);
    const isToday = d && dateKey(d) === todayKey;

    stripHtml +=
      `<a class="chip${isToday ? " is-today" : ""}" href="#day-${n}" data-day="${n}">
         <span class="chip-num">${n}</span>
         <span class="chip-dow">${d ? DOW_JP[d.getDay()] : "·"}</span>
       </a>`;

    if (prevCity && day.city !== prevCity) {
      routeHtml +=
        `<div class="transfer" style="animation-delay:${i * 70}ms">
           <span>${esc(day.via ? day.via + " → " : "→ ")}${esc(day.city)} ${esc(day.kana || "")}</span>
         </div>`;
    }
    prevCity = day.city;

    const rows = (day.items || []).map(itemHtml).join("");

    routeHtml +=
      `<section class="day${isToday ? " is-today" : ""}" id="day-${n}" data-day="${n}" style="animation-delay:${i * 70}ms">
         <div class="day-badge">${n}</div>
         <div class="day-eyebrow">
           <span class="day-kanji">${kanjiNum(n)}日目</span>
           <span class="day-date">${d ? DOW[d.getDay()] + ", " + MON[d.getMonth()] + " " + d.getDate() : "DATE TBD"}</span>
           ${isToday ? `<span class="today-pill">TODAY 本日</span>` : ""}
         </div>
         <h2 class="day-city">${esc(day.city)} <span class="kana">${esc(day.kana || "")}</span></h2>
         ${day.theme ? `<p class="day-theme">${esc(day.theme)}</p>` : ""}
         ${rows ? `<ul class="plans">${rows}</ul>`
                : `<div class="empty">Nothing planned yet — this day is open.</div>`}
         ${day.notes ? `<p class="day-notes">${esc(day.notes)}</p>` : ""}
       </section>`;
  });

  strip.innerHTML = stripHtml;
  route.innerHTML = routeHtml;

  const chips = [...strip.querySelectorAll(".chip")];
  const spy = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        chips.forEach(c => c.classList.toggle("on", c.dataset.day === e.target.dataset.day));
      }
    });
  }, { rootMargin: "-35% 0px -60% 0px" });
  route.querySelectorAll(".day").forEach(s => spy.observe(s));

  const todayEl = route.querySelector(".day.is-today");
  if (todayEl) setTimeout(() => todayEl.scrollIntoView({ block: "start" }), 60);
  setTimeout(() => document.body.classList.add("ready"), 1100);
}

render();
</script>
</body>
</html>
